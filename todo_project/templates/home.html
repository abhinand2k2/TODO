{% extends 'base.html' %}
{% block content %}

<div class="container-fluid">
    <div class="banner">
        <div class="banner-text">
            <h1>TODO LIST</h1>
        </div>
    </div>
</div>

<div class="container">
    <div class="row">

        <!-- Form -->
        <div class="col-md-6">
            <form method="POST" class="p-3 shadow">
                {% csrf_token %}

                <input type="text" name="task" class="form-control" placeholder="Task name"><br>
                <input type="text" name="priority" class="form-control" placeholder="Priority"><br>
                <input type="date" name="date" class="form-control"><br>

                <button type="submit" class="btn btn-success">Add</button>
            </form>
        </div>

        <!-- Task List -->
        <div class="col-md-6">
            <h4>Tasks</h4>

            {% for i in task1 %}
            <div class="card shadow mb-2">
                <div class="card-body">
                    <h5>{{i.name}}</h5>
                    <p>Priority: {{i.priority}}</p>
                    <p>Date: {{i.date}}</p>

                    <a href="{% url 'delete' i.id %}" class="btn btn-danger">Done</a>
                    <a href="{% url 'update' i.id %}" class="btn btn-success">Update</a>
                </div>
            </div>
            {% endfor %}

        </div>
    </div>
</div>

{% endblock %}
